# =============================================================================
# _config.yml — Portfolio de Joël DABIRE
# Thème : Minimal Mistakes (remote theme)
# =============================================================================

# --- Infos du site ---
title: "Joël DABIRE"
title_separator: "·"
subtitle: "Ingénieur IA & Big Data en alternance"
name: "Saânbèterfaa Joël DABIRE"
description: >-
  Étudiant ingénieur en IA & Big Data à l'ESIGELEC. Passionné de data,
  machine learning et visualisation. À la recherche d'une alternance 36 mois
  à partir de septembre 2026.
url: "https://sadabire.github.io"
baseurl: ""
repository: "Sadabire/Sadabire.github.io"

# --- Thème ---
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "contrast"  # options: default, air, aqua, contrast, dark
, dirt, neon, mint, plum, sunrise

# --- Plugins GitHub Pages ---
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# --- Auteur ---
author:
  name: "Joël DABIRE"
  avatar: "/assets/img/avatar.jpg"
  bio: >-
    Étudiant ingénieur IA & Big Data · ESIGELEC Poitiers.
    Analyse de données · Machine Learning · Big Data.
  location: "Aurillac, France · Mobilité nationale"
  email: "jodabire18@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sadabire"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/joel-dabire"  # à mettre à jour
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jodabire18@gmail.com"

# --- Footer ---
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sadabire"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/joel-dabire"

# --- Navigation ---
# Définie dans _data/navigation.yml

# --- Lecture ---
include:
  - _pages

# --- Pagination ---
paginate: 6
paginate_path: /projets/page:num/

# --- Defaults ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# --- Encoding ---
encoding: "utf-8"
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge

# --- Exclusions build ---
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gem"
  - README.md
  - vendor
