# =============================================================================
# _config.yml — Portfolio Joël DABIRE — Design Moderne
# =============================================================================

title: "Joël DABIRE"
title_separator: "·"
subtitle: "Data Scientist & Ingénieur Machine Learning"
name: "Saânbèterfaa Joël DABIRE"
description: >-
  Étudiant en fin de BUT Science des données, futur ingénieur IA & Big Data
  à l'ESIGELEC de Poitiers. En recherche d'alternance 36 mois dès septembre 2026.
url: "https://sadabire.github.io"
baseurl: ""
repository: "Sadabire/Sadabire.github.io"

# Thème Minimal Mistakes — skin sombre
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

author:
  name: "Joël DABIRE"
  avatar: "/assets/img/avatar.jpg"
  bio: >-
    En fin de BUT Science des données, je prépare un cycle ingénieur
    IA & Big Data à l'ESIGELEC de Poitiers. Je suis activement à la
    recherche d'une alternance de 36 mois à partir de septembre 2026
    dans les domaines de la Data, du Machine Learning et du Big Data.
  location: "Aurillac, France · Mobilité nationale"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sadabire"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/dabsanj18"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jodabire18@gmail.com"
    - label: "07 80 54 61 99"
      icon: "fas fa-fw fa-phone"
      url: "tel:+33780546199"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sadabire"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/dabsanj18"

include:
  - _pages

defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

encoding: "utf-8"
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gem"
  - README.md
  - vendor
