# ============================================================
# _config.yml — Portfolio Joël DABIRE — Design Blanc & Orange
# ============================================================

title: "Joël DABIRE"
title_separator: "·"
subtitle: "Data Scientist & Ingénieur Machine Learning"
name: "Saânbèterfaa Joël DABIRE"
description: >-
  Étudiant en fin de BUT Science des données, futur ingénieur IA & Big Data
  à l'ESIGELEC de Poitiers. En recherche d'alternance 36 mois dès septembre 2026.
url: "https://sadabire.github.io"
baseurl: ""
repository: "Sadabire/Sadabire.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

author:
  name: "Joël DABIRE"
  avatar: "/assets/img/avatar.jpg"
  bio: ""
  location: "Aurillac, France · Mobilité nationale"
  links: []

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sadabire"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/dabsanj18"

include:
  - _pages

defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

encoding: "utf-8"
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gem"
  - README.md
  - vendor
