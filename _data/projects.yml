- id: analyse-ventes-reseau
  title: "Analyse des ventes d'un réseau de magasins"
  description: >-
    Analyse des ventes de produits alimentaires dans un réseau de 6 magasins 
    sur 2022–2024 (40 860 observations, 10 produits). Nettoyage des données, 
    imputation par médiane hiérarchique, analyse descriptive des tendances 
    saisonnières, effet des promotions et compétition entre magasins. 
    Modélisation par régression de Poisson (GLM) avec 7 modèles comparés par AIC.
  results: >-
    Meilleur modèle AIC = 813 320 (avec variables financières) · Promotions : 
    +48% de ventes (62 → 92 unités) · Week-end : +21% vs semaine · 
    Magasin_6 le plus performant · MAE = 24,78 · Corrélation prédictions/observations = 0,543
  tags: [R, GLM Poisson, AIC, Statistiques descriptives, Saisonnalité, IQR, Visualisation]
  category: "Data Analysis"
  status: "terminé"
  github: "https://github.com/Sadabire/Analyse-des-ventes-de-produits-dans-un-r-seau-de-magasins"
  image: "/assets/img/projects/ventes.png"
  demo: ""
  date: 2025

