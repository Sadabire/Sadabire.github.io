- id: croissance-enfants
  title: "Analyse des courbes de croissance pédiatrique"
  description: >-
    Analyse longitudinale des courbes de croissance d'enfants (1–18 ans) pour 
    aider au dépistage précoce de troubles hormonaux. Gestion des valeurs 
    manquantes, interpolation spline cubique, comparaison statistique filles/garçons 
    par tests t, classification supervisée du sexe et détection d'enfants atypiques 
    par IMC et discordance prédictive KNN.
  results: >-
    KNN meilleur classifieur : accuracy 72,5% (validation croisée 10-fold stable à 72,2%) · 
    237 enfants à croissance atypique détectés · 5 374 enfants à IMC anormal · 
    111 enfants cumulant les deux anomalies sur 9 184 analysés
  tags: [Python, R, Spline cubique, KNN, LDA, QDA, Régression logistique, Naïve Bayes, Tests t, IMC]
  category: "Machine Learning"
  status: "terminé"
  github: "https://github.com/Sadabire/Croissance-enfants"
  image: "/assets/img/projects/croissance.png"
  demo: ""
  date: 2025

- id: migration-sql-nosql
  title: "Migration et optimisation SQL → NoSQL"
  description: >-
    Migration complète d'une base relationnelle PostgreSQL (6 tables, 300 024 
    employés) vers MongoDB. Mesure du coût des jointures SQL avec EXPLAIN ANALYZE, 
    export JSON via row_to_json et COPY, import avec mongoimport, puis 
    dénormalisation et indexation pour optimiser les performances de lecture.
  results: >-
    Jointure PostgreSQL : 3 698 ms → vue matérialisée : 540 ms · 
    Jointure MongoDB ($lookup) : 33 s → collection dénormalisée : 17 s (2x plus rapide) · 
    Recherche 1 employé : ~100 ms → 17 ms (6x plus rapide) · 
    Temps par document : 0,11 ms → 0,06 ms (45% plus rapide)
  tags: [PostgreSQL, MongoDB, EXPLAIN ANALYZE, JSON, mongoimport, Dénormalisation, Indexation, pgAdmin]
  category: "Bases de données"
  status: "terminé"
  github: "https://github.com/Sadabire/Migration-de-SQL-vers-NoSQL"
  image: "/assets/img/projects/migration.png"
  demo: ""
  date: 2025

- id: deepfake-ia
  title: "Deepfake, IA Générative & Cybersécurité"
  description: >-
    Étude approfondie des deepfakes : fonctionnement des GANs et auto-encodeurs, 
    technologies de face-swapping, outils de création (DeepFaceLab, HeyGen, 
    Resemble AI). Analyse des menaces (désinformation, fraude au président, 
    atteintes aux individus), impacts sociétaux et juridiques, et moyens de 
    prévention (détection IA, watermarking, blockchain, MFA). Réalisation 
    d'un deepfake expérimental.
  results: >-
    Analyse comparative de 6 outils deepfake · Deepfake expérimental réalisé avec 
    substitution faciale · Étude des GANs, autoencoders, CNN, RNN et NLP · 
    Recommandations sur la détection, l'authentification MFA et le cadre RGPD
